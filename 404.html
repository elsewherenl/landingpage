<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script>
        // GitHub Pages clean URL handler
        // This fetches and displays the correct .html file while keeping the clean URL

        (function() {
            const path = window.location.pathname;
            const cleanPath = path.replace(/\/$/, '');

            // Map clean URLs to actual files
            const routes = {
                '/about': '/about.html',
                '/spotlight': '/spotlight.html'
            };

            const targetFile = routes[cleanPath];

            if (targetFile) {
                // Fetch the HTML content and replace the current page
                fetch(targetFile)
                    .then(response => response.text())
                    .then(html => {
                        // Replace the entire document with the fetched content
                        document.open();
                        document.write(html);
                        document.close();

                        // Update the history state to keep the clean URL
                        history.replaceState(null, '', cleanPath);
                    })
                    .catch(() => {
                        window.location.replace('/');
                    });
            } else if (cleanPath === '' || cleanPath === '/') {
                window.location.replace('/');
            } else {
                // Actual 404 - redirect to home
                window.location.replace('/');
            }
        })();
    </script>
</head>
<body>
    <p>Loading...</p>
</body>
</html>
